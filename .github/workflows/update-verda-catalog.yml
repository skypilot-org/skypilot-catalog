name: "update-verda-catalog"
on:
  schedule:
     - cron:  '42 */7 * * *'
  workflow_dispatch:

jobs:
  update_verda_catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Clone SkyPilot repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: skypilot-org/skypilot
          path: sky
      - name: Clone Catalog repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: catalogs
          ref: master
          token: ${{ secrets.GH_ACTION_PAT }}
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.10"
      - name: Set up venv
        run: |
          uv venv --seed ~/catalogs-venv

      - name: Run fetch_verda
        id: fetch_catalogs
        run: |
          set -e  # Exit on error
          source ~/catalogs-venv/bin/activate

          # Check if .metadata.yml exists
          if [ ! -f "catalogs/.metadata.yml" ]; then
            echo "Error: .metadata.yml not found"
            exit 1
          fi

          versions=$(cat catalogs/.metadata.yml | yq -r '.version_commit | keys[]')
          if [ -z "$versions" ]; then
            echo "Error: No versions found in .metadata.yml"
            exit 1
          fi

          for version in $versions; do
            if [[ "$version" == "v7" ]]; then
              continue  # skip, as Verda was not added by this version
            fi
            echo "Processing version: $version"
            commit_hash=$(cat catalogs/.metadata.yml | yq -r ".version_commit.$version")
            if [ -z "$commit_hash" ]; then
              echo "Error: No commit hash found for version $version"
              exit 1
            fi

            cd sky
            if [ "$commit_hash" == "latest" ]; then
              commit_hash=$(git rev-parse origin/master)
            fi
            git checkout $commit_hash
            uv pip install "."
            cd -

            mkdir -p catalogs/catalogs/$version/verda

            echo "Running fetch_verda for version $version"
            SKYPILOT_CATALOG_SCHEMA_VERSION=$version python -m sky.catalog.data_fetchers.fetch_verda catalogs/catalogs/$version/verda/vms.csv

            if [ ! -f "catalogs/catalogs/$version/verda/vms.csv" ]; then
              echo "Error: verda/vms.csv was not created for version $version"
              exit 1
            fi
          done
        env:
          VERDA_CLIENT_ID: ${{ secrets.VERDA_CLIENT_ID }}
          VERDA_CLIENT_SECRET: ${{ secrets.VERDA_CLIENT_SECRET }}
      - name: Commit catalog
        run: |
          set -e  # Exit on error
          versions=$(cat catalogs/.metadata.yml | yq -r '.version_commit | keys[]' | awk '$0 != "v7"' | tr '\n' ', ')
          cd catalogs
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m"[Bot] Update Verda catalog $versions (scheduled at $(date))" || { echo "No changes to commit" && exit 0; }
          git fetch origin
          git rebase origin/master
          git push
